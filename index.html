<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>2048 By Atacan Çelikkol</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <h1>2048</h1>
    <div class="scoreboard">
        <div id="score">0</div>
        <div id="best">0</div>
    </div>
    <div class="controls">
        <button class="btn" id="restart">Restart</button>
        <button class="btn" id="undo">Undo</button>
        <button class="btn" id="theme">Theme</button>
    </div>
    <div class="undo-hint">Tip: Use arrow keys or swipe. Undo is limited to 1 step.</div>
    <div id="board-container">
        <div id="board"></div>
        <div id="game-over" style="display:none;">
            <div class="msg">Game Over</div>
            <button class="btn" onclick="restartGame()">Try Again</button>
        </div>
        <div id="game-won" style="display:none;">
            <div class="msg">You Win! 🎉</div>
            <button class="btn" onclick="continueGame()">Continue</button>
            <button class="btn" onclick="restartGame()">Restart</button>
        </div>
    </div>
    <div id="footer">
        Created by <a href="https://github.com/Atacan-Celikkol" target="_blank" rel="noopener">Atacan Çelikkol</a>
    </div>

    <img src="qr.svg">

</body>

<script src="scripts.js"></script>

</html>
